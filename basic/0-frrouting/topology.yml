# Configure a BGP session with an external BGP speaker

defaults.sources.extra: [ ../../defaults.yml ]
name: frrouting
defaults.device: frr
version: 25.12.03

nodes:
  r1:
    frr.daemons: [ isisd ]
  r2:
    module: [ isis ]

links:
- r1:
  r2:
  isis.passive: False

message: |
  The "Configuring IS-IS on FRRouting" lab is ready. Connect to the lab
  devices with the "netlab connect" command.

  Good luck!
